<!DOCTYPE html>
<html>
    <head>
        <title>Unit Converter In JavaScript</title>
        <link rel="shortcut icon" href="#"></link>
        <link rel="stylesheet" type="text/css" href="index.css"></link>
    </head>

    <body> 

    <div class="container">
        <h1>JavaScript Unit Converter</h1>

        <select id="from-unit">
            <option value="kilometer">Kilometer</option>
            <option value="meter">Meter</option>
            <option value="feet">Feet</option>
        </select>

        <input id="input-val" type="text" placeholder="Please enter something in the input field!"></input>
        
        <select id="to-unit">
            <option value="kilometer">Kilometers</option>
            <option value="meters">Meters</option>
            <option value="feet">Feet</option>
        </select>

        <p id="unit-el">Unit:</p>
        <p id="output-value">Converted to: </p>
        <button id="convert-btn">SUBMIT</button>
    </div>

    </body>
    <script src="index.js"></script>
</html>
